<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touchers League - Touch Football</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #131824;
            --bg-tertiary: #1a2030;
            --bg-card: #1e2633;
            --accent-primary: #00ff88;
            --accent-secondary: #00ccff;
            --text-primary: #ffffff;
            --text-secondary: #a8b3cf;
            --text-tertiary: #6b7a99;
            --border-color: #2a3547;
            --win-color: #00d97e;
            --draw-color: #ffc107;
            --loss-color: #ff4757;
            --live-color: #ff3b5c;
        }

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 204, 255, 0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        header {
            background: rgba(19, 24, 36, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(0, 255, 136, 0.5); }
        }

        .logo-text {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav {
            display: flex;
            gap: 32px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        nav a:hover::after, nav a.active::after {
            width: 100%;
        }

        main {
            padding: 40px 0;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-icon {
            width: 32px;
            height: 32px;
            background: var(--bg-card);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .news-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .news-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .news-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border-bottom: 1px solid var(--border-color);
        }

        .news-content {
            padding: 24px;
        }

        .news-category {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-primary);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .news-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .news-excerpt {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .news-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .matches-grid {
            display: grid;
            gap: 12px;
        }

        .match-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .match-card:hover {
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .match-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .live-badge {
            background: var(--live-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 2s ease-in-out infinite;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .match-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
        }

        .status-upcoming {
            background: rgba(0, 204, 255, 0.15);
            color: var(--accent-secondary);
        }

        .status-live {
            background: rgba(255, 59, 92, 0.15);
            color: var(--live-color);
        }

        .status-finished {
            background: rgba(168, 179, 207, 0.15);
            color: var(--text-secondary);
        }

        .teams {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .team-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 1px solid var(--border-color);
        }

        .team-name {
            font-weight: 600;
            font-size: 16px;
        }

        .team-score {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            min-width: 40px;
            text-align: center;
        }

        .team-row.winner .team-name {
            color: var(--accent-primary);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .league-table {
            width: 100%;
            border-collapse: collapse;
        }

        .league-table thead th {
            background: var(--bg-tertiary);
            padding: 16px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            border-bottom: 2px solid var(--border-color);
        }

        .league-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .league-table tbody tr:hover {
            background: rgba(0, 255, 136, 0.05);
        }

        .league-table td {
            padding: 16px 12px;
            font-size: 15px;
        }

        .position {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-tertiary);
            width: 40px;
        }

        .position-1, .position-2, .position-3 {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .stat-cell {
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            font-weight: 500;
        }

        .points {
            font-weight: 700;
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form {
            display: flex;
            gap: 4px;
        }

        .form-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .form-w { background: var(--win-color); color: white; }
        .form-d { background: var(--draw-color); color: white; }
        .form-l { background: var(--loss-color); color: white; }

        .team-logo.apex-united { background: linear-gradient(135deg, #ff4757, #ff6348); }
        .team-logo.apex-united::before { content: '▲'; color: white; font-size: 20px; }

        .team-logo.blaze-sc { background: linear-gradient(135deg, #ff9f43, #ff6b6b); }
        .team-logo.blaze-sc::before { content: '🔥'; font-size: 18px; }

        .team-logo.neon-stars { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .team-logo.neon-stars::before { content: '⭐'; font-size: 18px; }

        .team-logo.shadow-city { background: linear-gradient(135deg, #4a5568, #2d3748); }
        .team-logo.shadow-city::before { content: '🌙'; font-size: 18px; }

        .team-logo.crystal-bay { background: linear-gradient(135deg, #667eea, #764ba2); }
        .team-logo.crystal-bay::before { content: '💎'; font-size: 18px; }

        .team-logo.void-fc { background: linear-gradient(135deg, #2c003e, #1a0033); }
        .team-logo.void-fc::before { content: '🌌'; font-size: 18px; }

        .team-logo.touchers-fc { background: linear-gradient(135deg, #d4af37, #aa8c2e); }
        .team-logo.touchers-fc::before { content: '⚽'; font-size: 18px; }

        .team-logo.iron-wolves { background: linear-gradient(135deg, #636e72, #2d3436); }
        .team-logo.iron-wolves::before { content: '🐺'; font-size: 18px; }

        @media (max-width: 768px) {
            nav { gap: 16px; }
            nav a { font-size: 14px; }
            .logo { font-size: 22px; }
            .section-title { font-size: 20px; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">⚽</div>
                    <span class="logo-text">TOUCHERS LEAGUE</span>
                </div>
                <nav>
                    <a href="#news" class="active">News</a>
                    <a href="#fixtures">Fixtures</a>
                    <a href="#results">Results</a>
                    <a href="#table">Table</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <section id="news">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-icon">📰</div>
                        <span>Latest News</span>
                    </div>
                </div>
                <div id="news-container" class="loading">
                    <div class="spinner"></div>
                    <p>Loading news...</p>
                </div>
            </section>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Top Scorer</div>
                    <div class="stat-value" id="stat-top-scorer" style="font-size: 18px;">-</div>
                    <div style="font-size: 13px; color: var(--text-tertiary); margin-top: 4px;" id="stat-top-scorer-goals">0 goals</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Top Assists</div>
                    <div class="stat-value" id="stat-top-assists" style="font-size: 18px;">-</div>
                    <div style="font-size: 13px; color: var(--text-tertiary); margin-top: 4px;" id="stat-top-assists-count">0 assists</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Top Saves</div>
                    <div class="stat-value" id="stat-top-saves" style="font-size: 18px;">-</div>
                    <div style="font-size: 13px; color: var(--text-tertiary); margin-top: 4px;" id="stat-top-saves-count">0 saves</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">MVP Team</div>
                    <div class="stat-value" id="stat-mvp-team" style="font-size: 18px;">-</div>
                    <div style="font-size: 13px; color: var(--text-tertiary); margin-top: 4px;" id="stat-mvp-points">0 pts</div>
                </div>
            </div>

            <section id="fixtures" style="margin-top: 48px;">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-icon">📅</div>
                        <span>Upcoming Fixtures</span>
                    </div>
                </div>
                <div id="fixtures-container" class="loading">
                    <div class="spinner"></div>
                    <p>Loading fixtures...</p>
                </div>
            </section>

            <section id="results" style="margin-top: 48px;">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-icon">✅</div>
                        <span>Recent Results</span>
                    </div>
                </div>
                <div id="results-container" class="loading">
                    <div class="spinner"></div>
                    <p>Loading results...</p>
                </div>
            </section>

            <section id="table" style="margin-top: 48px;">
                <div class="card">
                    <div class="section-header" style="margin-bottom: 0;">
                        <div class="section-title">
                            <div class="section-icon">🏆</div>
                            <span>League Table</span>
                        </div>
                    </div>
                </div>
                <div id="table-container" class="loading">
                    <div class="spinner"></div>
                    <p>Loading table...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://ayxovfjroysubbzpjzzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5eG92Zmpyb3lzdWJienBqenprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDc2NDEsImV4cCI6MjA5MDI4MzY0MX0.npDIYWcxmMBS-kTCYzDn-_xf4aSO-DTIQuCIhE1VEig';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        function getTeamSlug(teamName) {
            return teamName.toLowerCase().replace(/\s+/g, '-');
        }

        async function renderNews() {
            const container = document.getElementById('news-container');
            try {
                const { data: news, error } = await supabase
                    .from('news')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!news || news.length === 0) {
                    container.innerHTML = '<p class="loading">No news articles yet. Check back soon!</p>';
                    return;
                }

                container.className = 'news-grid';
                container.innerHTML = news.map(article => `
                    <div class="news-card">
                        <div class="news-image">${article.icon || '📰'}</div>
                        <div class="news-content">
                            <div class="news-category">${article.category || 'News'}</div>
                            <h3 class="news-title">${article.title}</h3>
                            <p class="news-excerpt">${article.excerpt}</p>
                            <div class="news-meta">
                                <span>📅 ${article.date || 'Today'}</span>
                                <span>👁️ ${article.views || 0} views</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading news:', error);
                container.innerHTML = '<p class="loading">Error loading news</p>';
            }
        }

        async function renderFixtures() {
            const container = document.getElementById('fixtures-container');
            try {
                const { data: fixtures, error } = await supabase
                    .from('fixtures')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!fixtures || fixtures.length === 0) {
                    container.innerHTML = '<p class="loading">No upcoming fixtures. Check back soon!</p>';
                    return;
                }

                container.className = 'matches-grid';
                container.innerHTML = fixtures.map(match => {
                    const homeSlug = getTeamSlug(match.home_team);
                    const awaySlug = getTeamSlug(match.away_team);
                    const isLive = match.status === 'live';
                    const statusClass = `status-${match.status || 'upcoming'}`;
                    
                    return `
                        <div class="match-card">
                            <div class="match-header">
                                ${isLive ? '<div class="live-badge">LIVE</div>' : `<div class="match-time">${match.date} • ${match.time}</div>`}
                                <div class="match-status ${statusClass}">${match.status_text || 'Upcoming'}</div>
                            </div>
                            <div class="teams">
                                <div class="team-row">
                                    <div class="team-info">
                                        <div class="team-logo ${homeSlug}"></div>
                                        <div class="team-name">${match.home_team}</div>
                                    </div>
                                    <div class="team-score">${match.home_score !== null && match.home_score !== undefined ? match.home_score : '-'}</div>
                                </div>
                                <div class="team-row">
                                    <div class="team-info">
                                        <div class="team-logo ${awaySlug}"></div>
                                        <div class="team-name">${match.away_team}</div>
                                    </div>
                                    <div class="team-score">${match.away_score !== null && match.away_score !== undefined ? match.away_score : '-'}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading fixtures:', error);
                container.innerHTML = '<p class="loading">Error loading fixtures</p>';
            }
        }

        async function renderResults() {
            const container = document.getElementById('results-container');
            try {
                const { data: results, error } = await supabase
                    .from('results')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!results || results.length === 0) {
                    container.innerHTML = '<p class="loading">No results yet. Matches will appear here after they finish!</p>';
                    return;
                }

                container.className = 'matches-grid';
                container.innerHTML = results.map(match => {
                    const homeSlug = getTeamSlug(match.home_team);
                    const awaySlug = getTeamSlug(match.away_team);
                    const homeWon = match.home_score > match.away_score;
                    const awayWon = match.away_score > match.home_score;
                    
                    return `
                        <div class="match-card">
                            <div class="match-header">
                                <div class="match-time">${match.date} • ${match.time}</div>
                                <div class="match-status status-finished">Full Time</div>
                            </div>
                            <div class="teams">
                                <div class="team-row ${homeWon ? 'winner' : ''}">
                                    <div class="team-info">
                                        <div class="team-logo ${homeSlug}"></div>
                                        <div class="team-name">${match.home_team}</div>
                                    </div>
                                    <div class="team-score">${match.home_score}</div>
                                </div>
                                <div class="team-row ${awayWon ? 'winner' : ''}">
                                    <div class="team-info">
                                        <div class="team-logo ${awaySlug}"></div>
                                        <div class="team-name">${match.away_team}</div>
                                    </div>
                                    <div class="team-score">${match.away_score}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading results:', error);
                container.innerHTML = '<p class="loading">Error loading results</p>';
            }
        }

        async function renderTable() {
            const container = document.getElementById('table-container');
            try {
                const { data: teams, error } = await supabase
                    .from('teams')
                    .select('*');

                if (error) throw error;

                const sorted = teams.map(team => {
                    const gd = team.gf - team.ga;
                    const points = (team.won * 3) + team.drawn;
                    return { ...team, gd, points };
                }).sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;
                });

                container.className = 'card';
                container.innerHTML = `
                    <div class="table-wrapper">
                        <table class="league-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Team</th>
                                    <th>P</th>
                                    <th>W</th>
                                    <th>D</th>
                                    <th>L</th>
                                    <th>GF</th>
                                    <th>GA</th>
                                    <th>GD</th>
                                    <th>Pts</th>
                                    <th>Form</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sorted.map((team, index) => {
                                    const slug = getTeamSlug(team.name);
                                    const posClass = index < 3 ? `position-${index + 1}` : '';
                                    const formArray = Array.isArray(team.form) ? team.form : [];
                                    return `
                                        <tr>
                                            <td class="position ${posClass}">${index + 1}</td>
                                            <td>
                                                <div class="team-cell">
                                                    <div class="team-logo ${slug}"></div>
                                                    <span>${team.name}</span>
                                                </div>
                                            </td>
                                            <td class="stat-cell">${team.played}</td>
                                            <td class="stat-cell">${team.won}</td>
                                            <td class="stat-cell">${team.drawn}</td>
                                            <td class="stat-cell">${team.lost}</td>
                                            <td class="stat-cell">${team.gf}</td>
                                            <td class="stat-cell">${team.ga}</td>
                                            <td class="stat-cell">${team.gd >= 0 ? '+' : ''}${team.gd}</td>
                                            <td class="stat-cell"><span class="points">${team.points}</span></td>
                                            <td>
                                                <div class="form">
                                                    ${formArray.slice(-5).map(result => 
                                                        `<div class="form-dot form-${result.toLowerCase()}">${result}</div>`
                                                    ).join('')}
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading table:', error);
                container.innerHTML = '<p class="loading">Error loading table</p>';
            }
        }

        async function updateStats() {
            try {
                const { data: players } = await supabaseClient.from('players').select('*');
                const { data: teams } = await supabaseClient.from('teams').select('*');

                if (players && players.length > 0) {
                    const topScorer = players.reduce((max, p) => p.goals > (max.goals || 0) ? p : max, players[0]);
                    document.getElementById('stat-top-scorer').textContent = topScorer.name || '-';
                    document.getElementById('stat-top-scorer-goals').textContent = `${topScorer.goals || 0} goals`;

                    const topAssists = players.reduce((max, p) => p.assists > (max.assists || 0) ? p : max, players[0]);
                    document.getElementById('stat-top-assists').textContent = topAssists.name || '-';
                    document.getElementById('stat-top-assists-count').textContent = `${topAssists.assists || 0} assists`;

                    const topSaves = players.reduce((max, p) => p.saves > (max.saves || 0) ? p : max, players[0]);
                    document.getElementById('stat-top-saves').textContent = topSaves.name || '-';
                    document.getElementById('stat-top-saves-count').textContent = `${topSaves.saves || 0} saves`;
                }

                if (teams && teams.length > 0) {
                    const sorted = teams.map(team => ({
                        ...team,
                        points: (team.won * 3) + team.drawn
                    })).sort((a, b) => b.points - a.points);
                    
                    const mvpTeam = sorted[0];
                    document.getElementById('stat-mvp-team').textContent = mvpTeam.name || '-';
                    document.getElementById('stat-mvp-points').textContent = `${mvpTeam.points || 0} pts`;
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        async function init() {
            await Promise.all([
                renderNews(),
                renderFixtures(),
                renderResults(),
                renderTable(),
                updateStats()
            ]);
        }

        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    const offset = 80;
                    window.scrollTo({ 
                        top: target.offsetTop - offset, 
                        behavior: 'smooth' 
                    });
                    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });

        init();
    </script>
</body>
</html>
